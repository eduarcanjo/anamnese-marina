<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Fichas — Dra. Marina Gomes</title>
<style>
:root{--bg:#FFF9F9;--accent:#D4895B;--accent-dark:#b06f45;--ink:#3d332e;--muted:#8a7d76;--line:#ecdfd8;--card:#ffffff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}
.logo{display:block;max-width:280px;width:65%;margin:0 auto 20px;}
/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:40px 32px;max-width:400px;width:100%;box-shadow:0 8px 30px rgba(212,137,91,.1);text-align:center;}
.login-box h1{color:var(--accent-dark);font-size:1.3rem;margin-bottom:6px;font-weight:600;}
.login-box p{color:var(--muted);font-size:.9rem;margin-bottom:22px;}
.login-box input{width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;font-size:1rem;margin-bottom:14px;text-align:center;background:#fffdfc;}
.login-box input:focus{outline:none;border-color:var(--accent);}
.login-box button{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;}
.login-box button:hover{background:var(--accent-dark);}
.login-erro{color:#c0392b;font-size:.85rem;margin-bottom:12px;display:none;}
/* PAINEL */
#painel{display:none;max-width:1000px;margin:0 auto;padding:24px 16px 60px;}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
.top h1{color:var(--accent-dark);font-size:1.35rem;font-weight:600;}
.top .actions{display:flex;gap:10px;align-items:center;}
.busca{padding:11px 15px;border:1px solid var(--line);border-radius:24px;font-size:.92rem;width:230px;max-width:100%;background:#fffdfc;}
.busca:focus{outline:none;border-color:var(--accent);}
.sair{padding:9px 16px;background:transparent;border:1px solid var(--line);border-radius:24px;color:var(--muted);cursor:pointer;font-size:.88rem;}
.sair:hover{border-color:var(--accent);color:var(--accent-dark);}
.stats{color:var(--muted);font-size:.88rem;margin-bottom:16px;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 3px 12px rgba(212,137,91,.05);}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(212,137,91,.13);border-color:var(--accent);}
.card h3{color:var(--accent-dark);font-size:1.05rem;margin-bottom:6px;font-weight:600;}
.card .meta{font-size:.82rem;color:var(--muted);line-height:1.7;}
.card .meta b{color:var(--ink);font-weight:500;}
.loading,.vazio{text-align:center;padding:50px 20px;color:var(--muted);}
.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg);}}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,51,46,.55);z-index:50;padding:20px;overflow-y:auto;}
.overlay.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--card);border-radius:18px;max-width:640px;width:100%;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{position:sticky;top:0;background:var(--accent);color:#fff;padding:20px 24px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center;}
.modal-head h2{font-size:1.2rem;font-weight:600;}
.modal-head .x{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer;line-height:1;}
.modal-body{padding:20px 24px 28px;}
.grupo-t{color:var(--accent-dark);font-weight:600;font-size:1rem;margin:20px 0 10px;padding-bottom:7px;border-bottom:2px solid var(--line);}
.grupo-t:first-child{margin-top:0;}
.linha{display:grid;grid-template-columns:1fr 1.3fr;gap:12px;padding:8px 0;border-bottom:1px solid #f6efeb;font-size:.9rem;}
.linha .k{color:var(--muted);}
.linha .v{color:var(--ink);font-weight:500;word-break:break-word;}
.linha .v.vazio-v{color:#c9bcb4;font-weight:400;font-style:italic;}
.assinatura-img{display:block;max-width:100%;width:300px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:10px;}
.btn-baixar{display:inline-block;padding:8px 18px;background:var(--accent);color:#fff;text-decoration:none;border-radius:22px;font-size:.85rem;font-weight:500;}
.btn-baixar:hover{background:var(--accent-dark);}
.assinatura-linha-modal{grid-template-columns:1fr;}
@media(max-width:500px){.linha{grid-template-columns:1fr;gap:2px;}.linha .k{font-size:.78rem;}}
</style>
</head>

let CABE = [];
let LINHAS = [];

// ---- LOGIN ----
function entrar(){
  const s = document.getElementById('senhaInput').value;
  if(s === SENHA){
    sessionStorage.setItem('mg_auth','1');
    mostrarPainel();
  } else {
    document.getElementById('loginErro').style.display='block';
  }
}
document.getElementById('btnEntrar').addEventListener('click', entrar);
document.getElementById('senhaInput').addEventListener('keydown', e=>{ if(e.key==='Enter') entrar(); });
document.getElementById('sair').addEventListener('click', ()=>{ sessionStorage.removeItem('mg_auth'); location.reload(); });

function mostrarPainel(){
  document.getElementById('login').style.display='none';
  document.getElementById('painel').style.display='block';
  carregar();
}
if(sessionStorage.getItem('mg_auth')==='1'){ mostrarPainel(); }

// ---- LEITURA DA PLANILHA ----
function apiUrl(){ return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(ABA); }

function cellVal(row, col){
  const c = row.c && row.c[col];
  if(!c || c.v == null) return '';
  if(typeof c.v === 'boolean') return c.v ? 'Sim':'Não';
  if(typeof c.v === 'string' && c.v.startsWith('Date(')){
    const p = c.v.replace('Date(','').replace(')','').split(',');
    const y=p[0], m=String(parseInt(p[1])+1).padStart(2,'0'), d=String(p[2]).padStart(2,'0');
    return d+'/'+m+'/'+y;
  }
  if(c.f) return c.f;
  return String(c.v);
}

async function carregar(){
  try{
    const res = await fetch(apiUrl());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    CABE = json.table.cols.map(c=>c.label);
    LINHAS = json.table.rows.map(r=>{
      const o={};
      CABE.forEach((h,i)=>{ o[h]=cellVal(r,i); });
      return o;
    }).filter(o=> (o.nome||'').trim()!=='');
    render(LINHAS);
  }catch(err){
    document.getElementById('conteudo').innerHTML='<div class="vazio">Erro ao carregar as fichas.<br><small>'+err+'</small></div>';
  }
}

function render(lista){
  const stats=document.getElementById('stats');
  stats.textContent = lista.length+' ficha'+(lista.length!==1?'s':'')+' registrada'+(lista.length!==1?'s':'');
  if(!lista.length){ document.getElementById('conteudo').innerHTML='<div class="vazio">Nenhuma ficha encontrada.</div>'; return; }
  // mais recentes primeiro
  const ord = [...lista].reverse();
  const html = '<div class="cards">'+ord.map((o,idx)=>{
    const realIdx = lista.indexOf(o);
    return '<div class="card" data-i="'+realIdx+'">'+
      '<h3>'+(o.nome||'—')+'</h3>'+
      '<div class="meta">'+
      (o.celular?'<b>Tel:</b> '+o.celular+'<br>':'')+
      (o.cidade?'<b>Cidade:</b> '+o.cidade+'<br>':'')+
      (o.data_envio?'<b>Enviado:</b> '+o.data_envio:'')+
      '</div></div>';
  }).join('')+'</div>';
  document.getElementById('conteudo').innerHTML=html;
  document.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>abrirModal(lista[parseInt(c.dataset.i)]));
  });
}

function abrirModal(o){
  document.getElementById('modalNome').textContent = o.nome||'Ficha';
  let html='';
  GRUPOS.forEach(g=>{
    const titulo=g[0], campos=g[1];
    html+='<div class="grupo-t">'+titulo+'</div>';
    campos.forEach(k=>{
      const label = LABELS[k]||k;
      let v = o[k]!==undefined? o[k] : '';
      // Campo assinatura: renderiza imagem + botão baixar
      if(k==='assinatura'){
        if(v && v.indexOf('data:image')===0){
          const nomeArq = (o.nome||'assinatura').trim().replace(/\s+/g,'_').replace(/[^\w\-]/g,'');
          html+='<div class="linha assinatura-linha-modal"><div class="k">'+label+'</div>'+
            '<div class="v"><img class="assinatura-img" src="'+v+'" alt="Assinatura">'+
            '<a class="btn-baixar" href="'+v+'" download="assinatura_'+nomeArq+'.jpg">Baixar assinatura</a>'+
            '</div></div>';
        } else {
          html+='<div class="linha"><div class="k">'+label+'</div><div class="v vazio-v">— sem assinatura</div></div>';
        }
        return;
      }
      const cls = (v===''||v==null)?'v vazio-v':'v';
      if(v===''||v==null) v='—';
      html+='<div class="linha"><div class="k">'+label+'</div><div class="'+cls+'">'+v+'</div></div>';
    });
  });
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('fecharModal').addEventListener('click',()=>document.getElementById('overlay').classList.remove('show'));
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') document.getElementById('overlay').classList.remove('show'); });

// ---- BUSCA ----
document.getElementById('busca').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){ render(LINHAS); return; }
  render(LINHAS.filter(o=>(o.nome||'').toLowerCase().includes(q)));
});
</script>
